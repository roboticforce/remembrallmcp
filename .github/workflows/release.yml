name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        env:
          ORT_DYLIB_PATH: ""
        run: cargo build -p remembrall-server --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../remembrall-${{ matrix.target }}.tar.gz remembrall
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: remembrall-${{ matrix.target }}
          path: remembrall-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: remembrall-*.tar.gz
          generate_release_notes: true

  publish-crates:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Publish remembrall-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set +e
          out="$(cargo publish -p remembrall-core --no-verify 2>&1)"
          code=$?
          echo "$out"
          if [ "$code" -ne 0 ]; then
            # A re-run after a successful publish is not a failure (409 already exists).
            # Any other error (missing token, build failure) must fail the job.
            if echo "$out" | grep -qiE 'already exists|already (has been )?published|409 Conflict'; then
              echo "::warning::remembrall-core already published; treating as success"
              exit 0
            fi
            exit "$code"
          fi

      - name: Wait for crates.io indexing
        run: sleep 30

      - name: Publish remembrall-server
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set +e
          out="$(cargo publish -p remembrall-server --no-verify 2>&1)"
          code=$?
          echo "$out"
          if [ "$code" -ne 0 ]; then
            # A re-run after a successful publish is not a failure (409 already exists).
            # Any other error (missing token, build failure) must fail the job.
            if echo "$out" | grep -qiE 'already exists|already (has been )?published|409 Conflict'; then
              echo "::warning::remembrall-server already published; treating as success"
              exit 0
            fi
            exit "$code"
          fi

  publish-docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            cdnsteve/remembrallmcp:${{ steps.version.outputs.VERSION }}
            cdnsteve/remembrallmcp:latest
