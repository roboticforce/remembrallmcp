[[memories]]
id = "00000000-0000-0000-0000-000000000019"
content = "Idempotency keys are required on all payment creation endpoints. The key is stored in the database and duplicate requests with the same key return the original response. Key format: UUID v4 provided by the client."
summary = "Idempotency keys required for payment creation"
memory_type = "pattern"
tags = ["idempotency", "payments", "api", "reliability"]
project = "billing-service"
