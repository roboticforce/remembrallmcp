[[memories]]
id = "00000000-0000-0000-0000-000000000020"
content = "Retry with exponential backoff applied to all outbound HTTP calls to third-party services. Base delay 1 second, max 5 retries, max delay 30 seconds. Jitter added to prevent thundering herd. Non-retryable errors (4xx) are not retried."
summary = "Exponential backoff with jitter for third-party calls"
memory_type = "pattern"
tags = ["retry", "resilience", "http", "third-party", "exponential-backoff"]
project = "api-gateway"
team = "platform"
organization = "acme"
importance = 0.7
created_days_ago = 80

[[memories]]
id = "00000000-0000-0000-0000-000000000021"
content = "Dead letter queue pattern for failed webhook processing. Webhooks that fail after 3 retries are moved to a DLQ. An alert fires when DLQ depth exceeds 10. Manual review and replay is required for DLQ messages."
summary = "DLQ for failed webhook processing after 3 retries"
memory_type = "pattern"
tags = ["webhook", "dlq", "reliability", "queue", "alerting"]
project = "billing-service"
team = "platform"
organization = "acme"
importance = 0.7
created_days_ago = 55

[[memories]]
id = "00000000-0000-0000-0000-000000000022"
content = "Redis cache timeout pattern: all cache operations have a 50ms timeout. If Redis is unavailable or slow, fall back to the database. Never let a cache outage cause an API outage. Set socket timeout and connect timeout both to 50ms."
