[[memories]]
id = "00000000-0000-0000-0000-000000000018"
content = "Cache-aside pattern used for all read-heavy data. Read from cache first; on miss, read from database and populate cache. Write-through is not used because it complicates the write path and cache invalidation is handled by TTL."
summary = "Cache-aside pattern for read-heavy data"
memory_type = "pattern"
tags = ["cache", "redis", "pattern", "performance"]
