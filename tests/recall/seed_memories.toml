[[memories]]
id = "00000000-0000-0000-0000-000000000013"
content = "Always use database transactions when updating both user and billing tables. Never update one without wrapping both in a transaction. This prevents orphaned billing state when the user update fails after a billing record is written."
summary = "Guideline: wrap user+billing updates in transactions"
