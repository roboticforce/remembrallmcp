# Engram Recall Ground Truth
#
# 27 test queries with expected memory IDs, expected search method,
# and scoring thresholds.
#
# Fields per query:
#   id              - unique query identifier for reporting
#   query           - the search string passed to engram_recall
#   category        - A/B/C/D/E/F from the test matrix
#   method          - "semantic", "fulltext", or "hybrid"
#   relevant_ids    - memory IDs that count as correct results (ordered by relevance)
#   max_rank        - the relevant result must appear within this rank position
#   filters         - optional: memory_types, tags, project
#   expect_empty    - if true, result set must be empty

# ---------------------------------------------------------------------------
# CATEGORY A: Basic Search Quality
# ---------------------------------------------------------------------------

[[queries]]
id = "A01"
description = "Exact phrase in content"
query = "DATABASE_URL configuration"
category = "A"
method = "fulltext"
relevant_ids = ["00000000-0000-0000-0000-000000000016"]
max_rank = 1
# DATABASE_URL appears verbatim; FTS trivially wins

[[queries]]
id = "A02"
description = "Exact phrase in content - CORS error variable name"
query = "CORS_ALLOWED_ORIGINS error"
category = "A"
method = "fulltext"
relevant_ids = ["00000000-0000-0000-0000-000000000008"]
max_rank = 1

[[queries]]
id = "A03"
description = "Semantic - authentication mechanism intent"
query = "how does authentication work"
category = "A"
method = "semantic"
relevant_ids = [
  "00000000-0000-0000-0000-000000000004",  # JWT decision
  "00000000-0000-0000-0000-000000000030",  # auth middleware code context
  "00000000-0000-0000-0000-000000000012",  # JWT expiry bug
]
max_rank = 3

[[queries]]
id = "A04"
description = "Partial match - billing synonyms"
query = "billing payment processing decision"
category = "A"
method = "hybrid"
relevant_ids = [
  "00000000-0000-0000-0000-000000000002",  # Stripe decision
  "00000000-0000-0000-0000-000000000017",  # payment pipeline guideline
  "00000000-0000-0000-0000-000000000015",  # feature flags for payments
]
max_rank = 5

[[queries]]
id = "A05"
description = "No results - topic never stored"
query = "kubernetes helm chart deployment configuration"
category = "A"
method = "hybrid"
relevant_ids = []
expect_empty = false  # May return weak semantic matches; we don't assert empty, just no high-confidence hits
max_rank = 999
min_score_threshold = 0.7  # No result should have score >= 0.7 (used by harness to flag false positives)

[[queries]]
id = "A06"
description = "Partial keyword - 'billing' substring appears in many memories"
query = "billing"
category = "A"
method = "hybrid"
relevant_ids = [
  "00000000-0000-0000-0000-000000000001",
  "00000000-0000-0000-0000-000000000002",
  "00000000-0000-0000-0000-000000000003",
  "00000000-0000-0000-0000-000000000013",
]
max_rank = 5

# ---------------------------------------------------------------------------
# CATEGORY B: Hybrid Search Effectiveness
# ---------------------------------------------------------------------------

[[queries]]
id = "B01"
description = "Semantic wins - intent-based, no matching keywords"
query = "why is the API slow"
category = "B"
method = "semantic"
relevant_ids = [
  "00000000-0000-0000-0000-000000000010",  # PgBouncer (DB pool -> slowness)
  "00000000-0000-0000-0000-000000000011",  # N+1 query
  "00000000-0000-0000-0000-000000000005",  # Redis caching decision (perf)
  "00000000-0000-0000-0000-000000000023",  # async queue latency outcome
]
max_rank = 5

[[queries]]
id = "B02"
description = "Full-text wins - exact error term"
query = "CORS_ALLOWED_ORIGINS"
category = "B"
method = "fulltext"
relevant_ids = ["00000000-0000-0000-0000-000000000008"]
max_rank = 1

[[queries]]
id = "B03"
description = "Full-text wins - exact config var"
query = "BRAINTREE_MERCHANT_ID"
category = "B"
method = "fulltext"
relevant_ids = []
expect_empty = true  # Memory 41 is expired, must not appear

[[queries]]
id = "B04"
description = "Hybrid - Redis cache timeout pattern"
query = "Redis cache timeout pattern"
category = "B"
method = "hybrid"
relevant_ids = [
  "00000000-0000-0000-0000-000000000022",  # Redis 50ms timeout pattern
  "00000000-0000-0000-0000-000000000007",  # Redis connection timeout error
  "00000000-0000-0000-0000-000000000005",  # Redis cache decision
]
max_rank = 3

[[queries]]
id = "B05"
description = "Deduplication - same memory must appear once even if both methods match"
query = "Redis connection pool exhausted timeout"
category = "B"
method = "hybrid"
relevant_ids = ["00000000-0000-0000-0000-000000000007"]
max_rank = 1
assert_no_duplicate_ids = true

[[queries]]
id = "B06"
description = "Full-text only - null embedding memory must be retrievable"
query = "grpc_health_v1 proto health check"
category = "B"
method = "fulltext"
relevant_ids = ["00000000-0000-0000-0000-000000000042"]
max_rank = 3
# Memory 42 has null_embedding so semantic search cannot find it; FTS must carry it

# ---------------------------------------------------------------------------
# CATEGORY C: Filtering
# ---------------------------------------------------------------------------

[[queries]]
id = "C01"
description = "Filter by memory_type=decision"
query = "database choice"
category = "C"
method = "hybrid"
relevant_ids = [
  "00000000-0000-0000-0000-000000000001",  # PostgreSQL decision
  "00000000-0000-0000-0000-000000000005",  # Redis decision
]
max_rank = 3
filters = { memory_types = ["decision"] }
# Guideline 13 (transactions) is about database but is a guideline - must not appear

[[queries]]
id = "C02"
description = "Filter by memory_type=error_pattern"
