category = "D"
method = "hybrid"
relevant_ids = [
  "00000000-0000-0000-0000-000000000027",  # Redis OOM incident
  "00000000-0000-0000-0000-000000000022",  # Redis timeout pattern
  "00000000-0000-0000-0000-000000000007",  # Redis connection timeout
]
max_rank = 5

[[queries]]
id = "D03"
description = "Special characters in query - should not error"
query = "error: connection refused (os error 111)"
category = "D"
method = "hybrid"
relevant_ids = [
  "00000000-0000-0000-0000-000000000007",  # Redis connection timeout
  "00000000-0000-0000-0000-000000000010",  # PgBouncer exhaustion
]
max_rank = 5
assert_no_error = true

[[queries]]
id = "D04"
description = "Expired memory must not appear"
